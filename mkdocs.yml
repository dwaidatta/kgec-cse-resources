site_name: MAKAUT CSE Resources
site_url: https://dwaidatta.github.io/kgec-cse-resources/
site_description: Semester-wise study resources for MAKAUT CSE students.

repo_name: dwaidatta/makaut-cse-resources
repo_url: https://github.com/dwaidatta/makaut-cse-resources

theme:
  name: material
  icon:
    logo: material/school
    repo: fontawesome/brands/github
    previous: fontawesome/solid/arrow-left
    next: fontawesome/solid/arrow-right
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tabs.link
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  favicon: assets/favicon.png

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

copyright: >
  This repository is an independent student resource. It is NOT affiliated with, endorsed by, or officially maintained by MAKAUT or any college administration.

extra:
  # generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dwaidatta
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/dwaidatta
      name: LinkedIn
    - icon: fontawesome/solid/globe
      link: https://dwaidatta.in
      name: Website

nav:
  - Home: index.md
  - Semester 1:
      - Overview: semester-1/index.md
  - Semester 2:
      - Overview: semester-2/index.md
  - Semester 3:
      - Overview: semester-3/index.md
  - Semester 4:
      - Overview: semester-4/index.md
      - Discrete Mathematics (PCC-CS-401): semester-4/PCC-CS-401.md
      - Computer Architecture (PCC-CS-402): semester-4/PCC-CS-402.md
      - Formal Language & Automata Theory (PCC-CS-403): semester-4/PCC-CS-403.md
      - Design and Analysis of Algorithms (PCC-CS-404): semester-4/PCC-CS-404.md
      - Biology (BSC-401): semester-4/BSC-401.md  
      - Environmental Sciences (MC-401): semester-4/MC-401.md  
  - Semester 5:
      - Overview: semester-5/index.md
  - Semester 6:
      - Overview: semester-6/index.md
  - Semester 7:
      - Overview: semester-7/index.md
  - Semester 8:
      - Overview: semester-8/index.md